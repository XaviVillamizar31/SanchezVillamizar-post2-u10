name: API Tests con Newman

on: [push, pull_request]

jobs:
  api-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"

      - name: Compilar proyecto
        run: mvn -B package -DskipTests

      - name: Iniciar aplicacion
        run: java -jar target/*.jar &

      - name: Esperar que la app responda
        run: |
          for i in {1..15}; do
            curl -sf http://localhost:8080/api/tareas && break
            sleep 2
          done

      - name: Instalar Newman
        run: npm install -g newman

      - name: Ejecutar pruebas Newman
        run: newman run postman/ColeccionToDo.json --environment postman/env-ci.json