<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Lista de Tareas</title>

    <style>

        body {
            font-family: Arial, sans-serif;
            margin: 40px;
        }

        h1 {
            color: #333;
        }

        form {
            margin-bottom: 20px;
        }

        input {
            padding: 8px;
            width: 300px;
        }

        button {
            padding: 8px 15px;
            cursor: pointer;
        }

        li {
            margin-bottom: 10px;
        }

</head>
<body>

<h1>Gestor de Tareas</h1>

<form>

    <input type="text" placeholder="Nueva tarea">

    <button type="submit">
        Agregar
    </button>

</form>

<ul>

    <li>Estudiar Selenium</li>
    <li>Practicar Postman</li>

</ul>

</body>
</html>
